name: Release, Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  RELEASE_NAME: foodgram
  RELEASE_NAMESPACE: foodgram
  CHART_PATH: ./foodgram

jobs:
  release:
    name: Create semantic version tag
    runs-on: ${{ vars.CI_RUNNER_LABEL || 'ubuntu-latest' }}
    outputs:
      new_release: ${{ steps.semantic_release.outputs.new_release }}
      version: ${{ steps.semantic_release.outputs.version }}
      git_tag: ${{ steps.semantic_release.outputs.git_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install release tooling
        run: npm install --no-audit --no-fund

      - name: Run semantic-release
        id: semantic_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/semantic-release.mjs

  build:
    name: Build and push Docker images
    runs-on: ${{ vars.CI_RUNNER_LABEL || 'ubuntu-latest' }}
    needs: release
    if: needs.release.outputs.new_release == 'true'
    outputs:
      backend_image: ${{ steps.images.outputs.backend_image }}
      frontend_image: ${{ steps.images.outputs.frontend_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image names
        id: images
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          backend_image="${REGISTRY}/${owner}/${repo}/backend"
          frontend_image="${REGISTRY}/${owner}/${repo}/frontend"
          echo "backend_image=${backend_image}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${frontend_image}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.backend_image }}:${{ needs.release.outputs.git_tag }}
            ${{ steps.images.outputs.backend_image }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.frontend_image }}:${{ needs.release.outputs.git_tag }}
            ${{ steps.images.outputs.frontend_image }}:latest

  deploy:
    name: Deploy tagged images to Kubernetes
    runs-on: ${{ vars.CI_RUNNER_LABEL || 'ubuntu-latest' }}
    needs: [release, build]
    if: needs.release.outputs.new_release == 'true'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "::error::Add KUBE_CONFIG repository secret."
            exit 1
          fi

          mkdir -p "$HOME/.kube"
          if echo "$KUBE_CONFIG" | base64 --decode > "$HOME/.kube/config" 2>/dev/null; then
            chmod 600 "$HOME/.kube/config"
          else
            printf '%s' "$KUBE_CONFIG" > "$HOME/.kube/config"
            chmod 600 "$HOME/.kube/config"
          fi

      - name: Deploy with Helm
        run: |
          helm dependency update "$CHART_PATH"
          helm upgrade --install "$RELEASE_NAME" "$CHART_PATH" \
            --namespace "$RELEASE_NAMESPACE" \
            --create-namespace \
            --set global.namespace="$RELEASE_NAMESPACE" \
            --set-string backend.image="${{ needs.build.outputs.backend_image }}:${{ needs.release.outputs.git_tag }}" \
            --set-string frontend.image="${{ needs.build.outputs.frontend_image }}:${{ needs.release.outputs.git_tag }}" \
            --wait \
            --timeout 10m
